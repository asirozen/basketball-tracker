<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>אפליקציית קליעות כדורסל</title>
    <style>
        :root {
            --primary: #E65100;
            --primary-light: #FFB74D;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #263238;
            --border: #CFD8DC;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 40px;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), #FF6D00);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .config-card, .history-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .config-row:last-child {
            margin-bottom: 0;
        }
        select, input[type="date"], input[type="text"] {
            font-size: 0.95rem;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            box-sizing: border-box;
        }
        input[type="text"] {
            width: 160px;
        }
        .station-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .station-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .station-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #F8FAFC;
            padding: 8px;
            border-radius: 8px;
            gap: 10px;
        }
        .counter-input {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .counter-input input {
            width: 65px;
            text-align: center;
            font-size: 1.1rem;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .station-select {
            padding: 5px;
            font-size: 0.85rem;
            border-radius: 6px;
        }
        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }
        .history-item {
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            font-size: 0.9rem;
        }
        .history-item:last-child { border: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size:1.4rem;">🏀 אפליקציית מעקב קליעות</h1>
    </div>

    <!-- הגדרת אימון כללית -->
    <div class="config-card">
        <div class="config-row">
            <label>👤 <strong>שם המתאמן:</strong></label>
            <input type="text" id="player-name" placeholder="הכנס שם...">
        </div>
        <div class="config-row">
            <label>📅 <strong>תאריך אימון:</strong></label>
            <input type="date" id="workout-date">
        </div>
        <div class="config-row">
            <label>🎯 <strong>שינוי גלובלי (לכל התחנות):</strong></label>
            <select id="global-shots" onchange="updateAllStationsMax()"></select>
        </div>
    </div>

    <!-- תחנות קליעה -->
    <div id="stations-container"></div>

    <button class="btn-action" onclick="saveWorkout()">שמור אימון ביומן 💾</button>

    <!-- היסטוריית אימונים -->
    <div class="history-card" style="margin-top: 20px;">
        <h3 style="margin-top:0;">📅 היסטוריית אימונים ושמירות</h3>
        <div id="history-container">אין עדיין אימונים שמורים במערכת.</div>
        <button class="btn-action" style="background:#718096; font-size:0.9rem; padding:6px; margin-top:15px;" onclick="clearHistory()">מחיקת כל ההיסטוריה 🗑️</button>
    </div>

    <script>
        // רשימת התחנות המעודכנת (13 תחנות בסך הכל)
        const stations = [
            "קליעות עונשין", 
            "חצי פינה עונשין ימין", 
            "חצי פינה עונשין שמאל",
            "צעד וחצי ימין",
            "צעד וחצי שמאל",
            "JUMP SHOT עונשין",
            "JUMP SHOT פינה ימין עונשין",
            "JUMP SHOT פינה שמאל עונשין",
            "שלשה: פינה ימין (0°)", 
            "שלשה: 45° ימין", 
            "שלשה: מרכז (טופ)",
            "שלשה: 45° שמאל", 
            "שלשה: פינה שמאל (0°)"
        ];

        // מילוי סלקטור זריקות גלובלי (5 עד 50)
        const globalSelect = document.getElementById('global-shots');
        for(let i=5; i<=50; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = `${i} זריקות`;
            if(i === 20) opt.selected = true; 
            globalSelect.appendChild(opt);
        }

        // הגדרת תאריך של היום כברירת מחדל
        document.getElementById('workout-date').valueAsDate = new Date();

        // בניית התחנות במסך
        const container = document.getElementById('stations-container');
        stations.forEach((name, idx) => {
            const card = document.createElement('div');
            card.className = 'station-card';
            
            // יצירת סלקטור ייעודי לתחנה הספציפית
            let stationOptions = '';
            for(let i=5; i<=50; i++) {
                stationOptions += `<option value="${i}" ${i === 20 ? 'selected' : ''}>${i} זריקות</option>`;
            }

            card.innerHTML = `
                <div class="station-title">
                    <span>${name}</span>
                </div>
                <div class="station-controls">
                    <div class="counter-input">
                        <label style="font-size:0.85rem; color:#718096;">קלע:</label>
                        <input type="number" id="made-${idx}" min="0" placeholder="-" oninput="validateInput(${idx})">
                        <span style="color:#A0AEC0; font-weight:bold;">/</span>
                    </div>
                    <div>
                        <select id="total-${idx}" class="station-select" onchange="validateInput(${idx})">
                            ${stationOptions}
                        </select>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        // עדכון כל התחנות בבת אחת מהמפתח הראשי
        function updateAllStationsMax() {
            const globalMax = document.getElementById('global-shots').value;
            stations.forEach((_, idx) => {
                const stationSelect = document.getElementById(`total-${idx}`);
                stationSelect.value = globalMax;
                validateInput(idx);
            });
        }

        // בדיקת תקינות קלט לכל תחנה בנפרד
        function validateInput(idx) {
            const input = document.getElementById(`made-${idx}`);
            const max = parseInt(document.getElementById(`total-${idx}`).value);
            
            if (input.value !== '') {
                if (parseInt(input.value) > max) input.value = max;
                if (parseInt(input.value) < 0) input.value = 0;
            }
        }

        // שמירה ל-LocalStorage של הדפדפן
        function saveWorkout() {
            const playerName = document.getElementById('player-name').value.trim() || "שחקן כללי";
            const date = document.getElementById('workout-date').value;
            
            let workoutData = { name: playerName, date: date, results: [] };
            
            stations.forEach((name, idx) => {
                const madeVal = document.getElementById(`made-${idx}`).value;
                const totalVal = document.getElementById(`total-${idx}`).value;
                
                // אם המשתמש לא הזין כלום, נתייחס לזה כ-0 קליעות
                const made = madeVal === '' ? 0 : parseInt(madeVal);
                
                workoutData.results.push({
                    stationName: name,
                    made: made,
                    total: parseInt(totalVal)
                });
            });

            let history = JSON.parse(localStorage.getItem('bball_history')) || [];
            history.unshift(workoutData); 
            localStorage.setItem('bball_history', JSON.stringify(history));
            
            alert('האימון נשמר בהצלחה בהיסטוריה!');
            loadHistory();
            
            // ניקוי שדות הזנה לפעם הבאה (משאיר ריק, בלי אפסים)
            stations.forEach((_, idx) => document.getElementById(`made-${idx}`).value = '');
        }

        // טעינת ההיסטוריה מהזיכרון
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('bball_history')) || [];
            const histContainer = document.getElementById('history-container');
            if(history.length === 0) {
                histContainer.innerHTML = "אין עדיין אימונים שמורים במערכת.";
                return;
            }
            
            histContainer.innerHTML = '';
            history.forEach(workout => {
                let item = document.createElement('div');
                item.className = 'history-item';
                let formattedDate = new Date(workout.date).toLocaleDateString('he-IL');
                let nameToShow = workout.name || "שחקן כללי";
                
                let details = `<strong>👤 מתאמן: ${nameToShow} | 📅 יום ${formattedDate}:</strong><br>`;
                
                workout.results.forEach(res => {
                    let pct = res.total > 0 ? Math.round((res.made / res.total) * 100) : 0;
                    details += `• ${res.stationName}: ${res.made}/${res.total} (${pct}%)<br>`;
                });
                
                item.innerHTML = details;
                histContainer.appendChild(item);
            });
        }

        function clearHistory() {
            if(confirm("האם למחוק את כל היסטוריית האימונים לצמיתות?")) {
                localStorage.removeItem('bball_history');
                loadHistory();
            }
        }

        // טעינה ראשונית של היסטוריה
        loadHistory();
    </script>
</body>
</html>
