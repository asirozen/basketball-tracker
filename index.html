<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>אפליקציית קליעות כדורסל</title>
    <style>
        :root {
            --primary: #E65100;
            --primary-light: #FFB74D;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #263238;
            --border: #CFD8DC;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 40px;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), #FF6D00);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .config-card, .history-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .config-row:last-child {
            margin-bottom: 0;
        }
        select, input[type="date"], input[type="text"] {
            font-size: 0.95rem;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            box-sizing: border-box;
        }
        input[type="text"] {
            width: 160px;
        }
        .station-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .station-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .station-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #F8FAFC;
            padding: 8px;
            border-radius: 8px;
            gap: 10px;
        }
        .counter-input {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .counter-input input {
            width: 65px;
            text-align: center;
            font-size: 1.1rem;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .station-select {
            padding: 5px;
            font-size: 0.85rem;
            border-radius: 6px;
        }
        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }
        .history-item {
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            font-size: 0.9rem;
        }
        .history-item:last-child { border: none; }
        .loading {
            text-align: center;
            color: #718096;
            font-style: italic;
            padding: 10px;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size:1.4rem;">🏀 אפליקציית מעקב קליעות</h1>
    </div>

    <div class="config-card">
        <div class="config-row">
            <label>👤 <strong>שם המתאמן:</strong></label>
            <input type="text" id="player-name" placeholder="הכנס שם...">
        </div>
        <div class="config-row">
            <label>📅 <strong>תאריך אימון:</strong></label>
            <input type="date" id="workout-date">
        </div>
        <div class="config-row">
            <label>🎯 <strong>שינוי גלובלי (לכל התחנות):</strong></label>
            <select id="global-shots" onchange="updateAllStationsMax()"></select>
        </div>
    </div>

    <div id="stations-container"></div>

    <button class="btn-action" onclick="saveWorkout()">שמור אימון בענן 💾</button>

    <div class="history-card" style="margin-top: 20px;">
        <h3 style="margin-top:0;">📅 היסטוריית אימונים בענן (מסונכרן)</h3>
        <div id="history-container" class="loading">טוען נתונים מהענן...</div>
        <button class="btn-action" style="background:#718096; font-size:0.9rem; padding:6px; margin-top:15px;" onclick="clearHistory()">מחיקת כל ההיסטוריה 🗑️</button>
    </div>

    <script>
        // המפתחות המלאים ששלחת מהאתר
        const firebaseConfig = {
            apiKey: "AIzaSyAVkN0ahWuBhQsJZcyp5xKoJ3m1qkPEJ2M",
            authDomain: "basketball-tracker-7380a.firebaseapp.com",
            databaseURL: "https://basketball-tracker-7380a-default-rtdb.firebaseio.com",
            projectId: "basketball-tracker-7380a",
            storageBucket: "basketball-tracker-7380a.firebasestorage.app",
            messagingSenderId: "923195304585",
            appId: "1:923195304585:web:2fa41f6092a4b53787f458"
        };

        // אתחול המערכת
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const stations = [
            "קליעות עונשין", "חצי פינה עונשין ימין", "חצי פינה עונשין שמאל",
            "צעד וחצי ימין", "צעד וחצי שמאל", "JUMP SHOT עונשין",
            "JUMP SHOT פינה ימין עונשין", "JUMP SHOT פינה שמאל עונשין",
            "שלשה: פינה ימין (0°)", "שלשה: 45° ימין", "שלשה: מרכז (טופ)",
            "שלשה: 45° שמאל", "שלשה: פינה שמאל (0°)"
        ];

        // מילוי סלקטור זריקות גלובלי (5 עד 50)
        const globalSelect = document.getElementById('global-shots');
        for(let i=5; i<=50; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = `${i} זריקות`;
            if(i === 20) opt.selected = true; 
            globalSelect.appendChild(opt);
        }

        // הגדרת תאריך של היום כברירת מחדל
        document.getElementById('workout-date').valueAsDate = new Date();

        // בניית התחנות במסך
        const container = document.getElementById('stations-container');
        stations.forEach((name, idx) => {
            const card = document.createElement('div');
            card.className = 'station-card';
            
            let stationOptions = '';
            for(let i=5; i<=50; i++) {
                stationOptions += `<option value="${i}" ${i === 20 ? 'selected' : ''}>${i} זריקות</option>`;
            }

            card.innerHTML = `
                <div class="station-title">
                    <span>${name}</span>
                </div>
                <div class="station-controls">
                    <div class="counter-input">
                        <label style="font-size:0.85rem; color:#718096;">קלע:</label>
                        <input type="number" id="made-${idx}" min="0" placeholder="-" oninput="validateInput(${idx})">
                        <span style="color:#A0AEC0; font-weight:bold;">/</span>
                    </div>
                    <div>
                        <select id="total-${idx}" class="station-select" onchange="validateInput(${idx})">
                            ${stationOptions}
                        </select>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        function updateAllStationsMax() {
            const globalMax = document.getElementById('global-shots').value;
            stations.forEach((_, idx) => {
                document.getElementById(`total-${idx}`).value = globalMax;
                validateInput(idx);
            });
        }

        function validateInput(idx) {
            const input = document.getElementById(`made-${idx}`);
            const max = parseInt(document.getElementById(`total-${idx}`).value);
            if (input.value !== '') {
                if (parseInt(input.value) > max) input.value = max;
                if (parseInt(input.value) < 0) input.value = 0;
            }
        }

        // שמירה לענן
        function saveWorkout() {
            const playerName = document.getElementById('player-name').value.trim() || "שחקן כללי";
            const date = document.getElementById('workout-date').value;
            
            let resultsArray = [];
            stations.forEach((name, idx) => {
                const madeVal = document.getElementById(`made-${idx}`).value;
                const totalVal = document.getElementById(`total-${idx}`).value;
                resultsArray.push({
                    stationName: name,
                    made: madeVal === '' ? 0 : parseInt(madeVal),
                    total: parseInt(totalVal)
                });
            });

            database.ref('workouts').push({
                name: playerName,
                date: date,
                results: resultsArray,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }, function(error) {
                if (error) {
                    alert('שגיאה בשמירה: ' + error.message);
                } else {
                    alert('האימון נשמר והסתנכרן בענן בהצלחה!');
                    stations.forEach((_, idx) => document.getElementById(`made-${idx}`).value = '');
                }
            });
        }

        // טעינה ועדכון אוטומטי מהענן בריל-טיים
        database.ref('workouts').orderByChild('timestamp').on('value', function(snapshot) {
            const histContainer = document.getElementById('history-container');
            histContainer.innerHTML = '';
            
            let historyHTML = [];
            snapshot.forEach(function(childSnapshot) {
                const workout = childSnapshot.val();
                let formattedDate = new Date(workout.date).toLocaleDateString('he-IL');
                let nameToShow = workout.name || "שחקן כללי";
                
                let details = `<div class="history-item"><strong>👤 מתאמן: ${nameToShow} | 📅 יום ${formattedDate}:</strong><br>`;
                
                workout.results.forEach(res => {
                    let pct = res.total > 0 ? Math.round((res.made / res.total) * 100) : 0;
                    details += `• ${res.stationName}: ${res.made}/${res.total} (${pct}%)<br>`;
                });
                
                details += `</div>`;
                historyHTML.unshift(details); // החדש ביותר למעלה
            });

            if(historyHTML.length === 0) {
                histContainer.innerHTML = "אין עדיין אימונים שמורים במערכת.";
            } else {
                histContainer.innerHTML = historyHTML.join('');
            }
        }, function(error) {
            document.getElementById('history-container').innerHTML = "שגיאה בטעינת נתונים: " + error.message;
        });

        function clearHistory() {
            if(confirm("האם למחוק את כל היסטוריית האימונים מהענן לצמיתות?")) {
                database.ref('workouts').remove();
            }
        }
    </script>
</body>
</html>
